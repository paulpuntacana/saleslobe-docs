<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | SalesLobe Docs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --radius: 10px;
    --radius-sm: 6px;
    --transition: 0.18s ease;
  }

  [data-theme="light"] {
    --bg:        #f8f9fc;
    --surface:   #ffffff;
    --border:    #e8eaf0;
    --text:      #111827;
    --text2:     #374151;
    --muted:     #6b7280;
    --accent:    #6366f1;
    --accent-bg: rgba(99,102,241,0.08);
    --accent-border: rgba(99,102,241,0.2);
    --shadow:    0 1px 3px rgba(0,0,0,0.06);
  }

  [data-theme="dark"] {
    --bg:        #0d1117;
    --surface:   #161b27;
    --border:    #252d3d;
    --text:      #e8ecf5;
    --text2:     #c9d1e0;
    --muted:     #8892a4;
    --accent:    #818cf8;
    --accent-bg: rgba(129,140,248,0.1);
    --accent-border: rgba(129,140,248,0.25);
    --shadow:    0 1px 3px rgba(0,0,0,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    transition: background var(--transition), color var(--transition);
  }

  .container {
    text-align: center;
    max-width: 480px;
  }

  .code-badge {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 72px;
    font-weight: 700;
    letter-spacing: -0.04em;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 24px;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 10px;
    letter-spacing: -0.01em;
  }

  p {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.65;
    margin-bottom: 32px;
  }

  .actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 18px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    transition: all var(--transition);
    cursor: pointer;
    border: none;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }

  .btn-primary:hover { opacity: 0.88; }

  .btn-secondary {
    background: var(--surface);
    color: var(--text2);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }

  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  .logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 40px;
  }

  .logo-mark {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
  }

  .logo-mark svg { width: 15px; height: 15px; fill: white; }
  .logo-name { font-size: 14px; font-weight: 600; color: var(--text); }
</style>
</head>
<body>

<div class="container">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 20 20"><path d="M10 2a8 8 0 100 16A8 8 0 0010 2zm0 3a2 2 0 110 4 2 2 0 010-4zm0 9.5c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08A7.13 7.13 0 0110 14.5z"/></svg>
    </div>
    <span class="logo-name">SalesLobe Docs</span>
  </div>

  <div class="code-badge">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has been moved.<br>Head back to the API docs to find what you need.</p>

  <div class="actions">
    <a href="/" class="btn btn-primary">← Back to Docs</a>
    <a href="/#overview" class="btn btn-secondary">Overview</a>
  </div>
</div>

<script>
  if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
</script>
</body>
</html>
